<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Chat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app">
      <header class="app-header">
        <div class="title-row">
          <h1>💬 Simple Chat</h1>
          <div class="header-actions">
            <button id="themeToggle" class="ghost-btn" type="button">
              🌙 Dark
            </button>
            <button
              id="manageUsersBtn"
              class="ghost-btn hidden-control"
              type="button"
            >
              👥 Manage Users
            </button>
            <button
              id="clearAllBtn"
              class="ghost-btn danger-btn hidden-control"
              type="button"
            >
              🗑️ Clear All
            </button>
            <button id="changeUserBtn" class="ghost-btn" type="button">
              <span class="profile-icon">👤</span>
              Change User
            </button>
          </div>
        </div>
        <p class="subtitle">
          <span class="live-dot"></span>
          Signed in as <strong id="userLabel"></strong>
        </p>
        <div class="status-row">
          <span id="messageCount" class="badge">0 messages</span>
        </div>
      </header>

      <section class="toolbar">
        <input
          id="searchInput"
          type="text"
          placeholder="Search messages..."
          aria-label="Search messages"
        />
      </section>

      <main id="chat" class="chat"></main>

      <form id="composerForm" class="composer" autocomplete="off">
        <div class="composer-main">
          <input
            id="msgInput"
            type="text"
            placeholder="Type message..."
            maxlength="500"
          />
          <button id="sendBtn" type="submit">Send</button>
        </div>
        <p id="charCount" class="char-count">0/500</p>
      </form>
    </div>

    <div
      id="usersModal"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
    >
      <div class="auth-card users-card">
        <h2 class="auth-title">Registered Users</h2>
        <p class="auth-subtitle">
          All signed-in users can view accounts. Only admin can delete accounts.
        </p>

        <p id="usersInfo" class="users-info">Loading users...</p>
        <div id="usersList" class="users-list"></div>

        <div class="users-actions">
          <button id="refreshUsersBtn" class="auth-btn secondary" type="button">
            Refresh
          </button>
          <button id="closeUsersModalBtn" class="auth-btn" type="button">
            Close
          </button>
        </div>
      </div>
    </div>

    <div id="authModal" class="modal-overlay" role="dialog" aria-modal="true">
      <div class="auth-card">
        <h2 class="auth-title">Welcome to chat</h2>
        <p class="auth-subtitle">
          Create a new account if you are new, or sign in if already registered.
        </p>

        <label class="auth-label" for="authUsername">Username</label>
        <input
          id="authUsername"
          class="auth-input"
          type="text"
          maxlength="30"
        />

        <label class="auth-label" for="authPassword">Password</label>
        <input
          id="authPassword"
          class="auth-input"
          type="password"
          maxlength="64"
        />

        <p id="authError" class="auth-error"></p>

        <div class="auth-actions">
          <button
            id="createAccountBtn"
            class="auth-btn secondary"
            type="button"
          >
            Create New Account
          </button>
          <button id="signInBtn" class="auth-btn" type="button">
            Sign In (Registered)
          </button>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="script.js"></script>
  </body>
</html>
